<div
  class="fixed inset-0 z-50 flex items-center justify-center bg-black/70 px-4"
  (click)="cancelled.emit()">

  <div
    class="w-full max-w-sm rounded-2xl bg-zinc-900 p-6 shadow-2xl ring-1 ring-zinc-700"
    (click)="$event.stopPropagation()">

    <h2 class="text-base font-semibold text-zinc-100">{{ title() }}</h2>
    <p class="mt-2 text-sm text-zinc-400">{{ description() }}</p>

    <div class="mt-6 flex gap-3">

      <button
        (click)="cancelled.emit()"
        [disabled]="loading()"
        class="flex-1 rounded-lg border border-zinc-700 px-4 py-2.5 text-sm font-medium text-zinc-300 transition hover:bg-zinc-800 disabled:opacity-50">
        Cancelar
      </button>

      <button
        (click)="confirmed.emit()"
        [disabled]="loading()"
        class="flex-1 rounded-lg bg-red-600 px-4 py-2.5 text-sm font-semibold text-white transition hover:bg-red-700 disabled:opacity-50">
        @if (loading()) {
          ...
        } @else {
          {{ confirmLabel() }}
        }
      </button>

    </div>

  </div>

</div>
