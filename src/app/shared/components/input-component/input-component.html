<div class="flex flex-col gap-1.5">

  <label class="text-sm font-medium text-zinc-400">
    {{ label() }}
  </label>

  <input
    class="w-full rounded-lg border bg-zinc-800 px-3.5 py-2.5 text-sm text-zinc-100 outline-none transition placeholder:text-zinc-600 focus:ring-2 focus:ring-amber-500/20 focus:border-amber-500"
    [class.border-zinc-700]="!showError"
    [class.border-red-500]="showError"
    [type]="type()"
    [value]="value"
    (input)="updateValue($event)"
    (blur)="onTouched()"
    [placeholder]="placeholder()" />

  @if (showError) {
    <span class="text-xs text-red-400">{{ errorMessage }}</span>
  }

</div>
