<div class="flex flex-col gap-1.5">

  <label class="text-sm font-medium text-zinc-400">
    {{ label() }}
  </label>

  <div class="relative">

    <input
      class="w-full rounded-lg border bg-zinc-800 px-3.5 py-2.5 pr-20 text-sm text-zinc-100 outline-none transition placeholder:text-zinc-600 focus:ring-2 focus:ring-amber-500/20 focus:border-amber-500"
      [class.border-zinc-700]="!showError"
      [class.border-red-500]="showError"
      [type]="show() ? 'text' : 'password'"
      [value]="value"
      (input)="updateValue($event)"
      (blur)="onTouched()" />

    <button
      type="button"
      class="absolute right-3 top-1/2 -translate-y-1/2 text-xs font-medium text-zinc-500 transition hover:text-zinc-300"
      (click)="toggle()">

      {{ show() ? 'Ocultar' : 'Mostrar' }}

    </button>

  </div>

  @if (showError) {
    <span class="text-xs text-red-400">{{ errorMessage }}</span>
  }

</div>
