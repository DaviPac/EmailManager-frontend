<div class="flex min-h-screen items-center justify-center bg-zinc-950 p-4">

  <app-card>

    <div class="mb-7 flex items-center gap-3">
      <svg class="h-9 w-9 shrink-0" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect width="32" height="32" rx="8" fill="#f59e0b"/>
        <rect x="5" y="10" width="22" height="15" rx="2.5" fill="white"/>
        <path d="M5 13.5L16 21L27 13.5" stroke="#f59e0b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <div>
        <h1 class="text-xl font-semibold text-zinc-100">Criar conta</h1>
        <p class="text-xs text-zinc-500">Email descartável em segundos</p>
      </div>
    </div>

    <form [formGroup]="form" (ngSubmit)="onSubmit()" class="space-y-4">

      <app-input
        label="E-mail"
        type="email"
        formControlName="email">
      </app-input>

      <app-password-input
        label="Senha"
        formControlName="password">
      </app-password-input>

      <div class="flex flex-col gap-1.5">
        <app-password-input
          label="Confirmar senha"
          formControlName="confirmPassword">
        </app-password-input>
        @if (passwordsMismatch) {
          <p class="text-xs text-red-400">As senhas não coincidem.</p>
        }
      </div>

      <p class="text-xs text-zinc-600">
        Mínimo 8 caracteres com maiúscula, número e símbolo (!&#64;#$%...).
      </p>

      @if (error()) {
        <p class="rounded-lg bg-red-500/10 px-4 py-3 text-sm text-red-400 ring-1 ring-red-500/20">
          {{ error() }}
        </p>
      }

      <div class="pt-1">
        <app-button type="submit" [loading]="loading()">
          Criar conta
        </app-button>
      </div>

    </form>

    <p class="mt-6 text-center text-sm text-zinc-600">
      Já tem conta?
      <a routerLink="/login" class="font-medium text-amber-400 transition hover:text-amber-300">
        Entrar
      </a>
    </p>

  </app-card>

</div>
